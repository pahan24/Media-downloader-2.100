services:
  - type: web
    name: vidsnap-backend
    runtime: python
    buildCommand: "apt-get install -y ffmpeg && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 600"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
